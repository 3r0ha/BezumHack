version: '3.8'

services:
  # --- Infrastructure ---
  gateway:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - auth
      - projects
      - chat
      - ai
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-platform}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-platform_secret}
      POSTGRES_DB: ${POSTGRES_DB:-platform}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  # --- Frontend ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    depends_on:
      - auth
      - projects
      - chat
      - ai
    restart: unless-stopped

  # --- Backend Services ---
  auth:
    build:
      context: ./services/auth
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-platform}:${POSTGRES_PASSWORD:-platform_secret}@postgres:5432/auth_db
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  projects:
    build:
      context: ./services/projects
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-platform}:${POSTGRES_PASSWORD:-platform_secret}@postgres:5432/projects_db
      AUTH_SERVICE_URL: http://auth:3001
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    depends_on:
      - postgres
      - redis
      - auth
    restart: unless-stopped

  chat:
    build:
      context: ./services/chat
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-platform}:${POSTGRES_PASSWORD:-platform_secret}@postgres:5432/chat_db
      AUTH_SERVICE_URL: http://auth:3001
      AI_SERVICE_URL: http://ai:3004
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    depends_on:
      - postgres
      - redis
      - auth
    restart: unless-stopped

  ai:
    build:
      context: ./services/ai
      dockerfile: Dockerfile
    environment:
      AI_API_KEY: ${AI_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-claude-sonnet-4-20250514}
    restart: unless-stopped

volumes:
  postgres_data:
