upstream frontend {
    server frontend:3000;
}

upstream auth_service {
    server auth:3001;
}

upstream projects_service {
    server projects:3002;
}

upstream chat_service {
    server chat:3003;
}

upstream ai_service {
    server ai:3004;
}

upstream notifications_service {
    server notifications:3005;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name antihype.lol www.antihype.lol;
    return 301 https://$host$request_uri;
}

# HTTPS
server {
    listen 443 ssl;
    server_name antihype.lol www.antihype.lol;

    ssl_certificate /etc/letsencrypt/live/antihype.lol/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/antihype.lol/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 50M;

    # Git redirect
    location = /git {
        return 301 https://github.com/3r0ha/BezumHack;
    }

    # Frontend
    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Auth API
    location /api/auth/ {
        proxy_pass http://auth_service/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Projects API
    location /api/projects/ {
        proxy_pass http://projects_service/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Chat API + WebSocket
    location /api/chat/ {
        proxy_pass http://chat_service/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Uploaded files (auth required — proxied through chat service)
    location /uploads/ {
        proxy_pass http://chat_service/upload/file/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Pass Authorization header for JWT check
        proxy_set_header Authorization $http_authorization;
    }

    # AI API
    location /api/ai/ {
        proxy_pass http://ai_service/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # Notifications API
    location /api/notifications/ {
        proxy_pass http://notifications_service/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # CI/CD webhooks from GitLab/GitHub (no auth required — verified by signature)
    location /api/cicd/ {
        proxy_pass http://projects_service/cicd/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Gitlab-Event $http_x_gitlab_event;
        proxy_set_header X-GitHub-Event $http_x_github_event;
    }

    # Socket.IO — Chat
    location /socket.io/ {
        proxy_pass http://chat_service/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
    }

    # Socket.IO — Notifications
    location /notifications-ws/ {
        proxy_pass http://notifications_service/notifications-ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
    }
}
